spring.application.name=ecogrow

# ── MySQL (usa variáveis de ambiente, com fallback para localhost) ──
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/ecogrow?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Porta (Render define PORT dinamicamente) ───────
server.port=${PORT:8080}
